<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Inscrição — Princesas Adornadas</title>
  <meta name="description" content="Faça sua inscrição no encontro Princesas Adornadas e garanta sua vaga. Vagas limitadas.">

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <meta name="theme-color" content="#c81e6e">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://docs.google.com">

  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Outfit:wght@500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Outfit:wght@500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Outfit:wght@500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap"></noscript>

  <link rel="stylesheet" href="css/styles.css">

  <script src="js/config.js"></script>
  <script src="js/seo.js"></script>
  <script defer src="js/header.js"></script>
  <script defer src="js/footer.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body>

  <a class="pular-conteudo" href="#formWrap">Pular para o conteúdo</a>

  <!-- ===== Topbar (componente em js/header.js) ===== -->
  <div id="header-mount" data-pagina="inscricao"></div>

  <!-- ===== Hero da inscrição ===== -->
  <section class="pagina-hero">
    <h1 data-pagina-insc-titulo>Faça sua Inscrição</h1>
    <p data-tema>Adornadas pela Graça</p>
    <p class="pagina-hero-meta">📅 <span data-evento-data></span> &nbsp;•&nbsp; 📍 <span data-local-nome></span></p>
  </section>

  <main class="secao">
    <div class="container insc-wrap">

      <!-- Contagem regressiva -->
      <div class="evento-card" style="margin-bottom:2.5rem" data-reveal>
        <h2 data-evento-titulo>Próximo Encontro</h2>
        <p class="evento-meta" data-pagina-insc-subtitulo>Garanta sua vaga antes que as inscrições se encerrem</p>
        <div id="countdown"></div>
      </div>

      <!-- Passo a passo -->
      <h2 class="titulo-secao" data-pagina-insc-passos-titulo>Como se inscrever</h2>
      <ol class="passos" data-pagina-insc-passos data-reveal></ol>

      <!-- Formulário (Google Forms incorporado) -->
      <div id="formWrap" data-reveal></div>

      <!-- Alternativa pelo WhatsApp -->
      <div class="insc-alt" data-reveal>
        <p data-pagina-insc-wa-titulo>Prefere se inscrever pelo WhatsApp? É só falar com a gente:</p>
        <a class="btn btn-whats btn-grande" data-whatsapp target="_blank" rel="noopener">
          <svg class="wa-svg" viewBox="0 0 448 512" aria-hidden="true"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
          <span data-pagina-insc-wa-botao>Inscrição pelo WhatsApp</span>
        </a>
      </div>

      <p class="voltar"><a href="index.html" data-pagina-insc-voltar>← Voltar para a página inicial</a></p>
    </div>
  </main>

  <!-- ===== Rodapé + WhatsApp flutuante (componente em js/footer.js) ===== -->
  <div id="footer-mount"></div>

</body>
</html>
