<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Galeria de Fotos — Princesas Adornadas</title>
  <meta name="description" content="Reviva os melhores momentos do Princesas Adornadas em fotos: louvor, comunhão e ministração entre mulheres cristãs.">

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <meta name="theme-color" content="#c81e6e">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://drive.google.com">

  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Outfit:wght@500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Outfit:wght@500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Outfit:wght@500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap"></noscript>

  <link rel="stylesheet" href="css/styles.css">

  <script src="js/config.js"></script>
  <script src="js/seo.js"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/drive.js"></script>
  <script defer src="js/galeria.js"></script>
  <script defer src="js/header.js"></script>
  <script defer src="js/footer.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body>

  <a class="pular-conteudo" href="#galeria-titulo">Pular para o conteúdo</a>

  <!-- ===== Topbar (componente em js/header.js) ===== -->
  <div id="header-mount" data-pagina="galeria"></div>

  <!-- ===== Hero da galeria ===== -->
  <section class="galeria-hero">
    <h1 data-pagina-galeria-titulo>Galeria de Momentos</h1>
    <p data-pagina-galeria-subtitulo>Reviva cada edição. Escolha uma sessão ao lado e relembre os momentos especiais. 👑</p>
  </section>

  <!-- ===== Layout: menu de sessões + grade ===== -->
  <main class="galeria-layout">
    <aside id="galeria-menu" aria-label="Sessões"></aside>
    <section>
      <h2 id="galeria-titulo">Carregando…</h2>
      <div id="galeria-grade"></div>
    </section>
  </main>

  <!-- ===== Lightbox ===== -->
  <div id="lightbox" aria-hidden="true">
    <button class="lb-btn lb-fechar" onclick="fecharLightbox()" aria-label="Fechar">✕</button>
    <button class="lb-btn lb-prev" onclick="navLightbox(-1)" aria-label="Anterior">‹</button>
    <img id="lb-img" src="" alt="Foto ampliada">
    <button class="lb-btn lb-next" onclick="navLightbox(1)" aria-label="Próxima">›</button>
  </div>

  <!-- ===== Rodapé + WhatsApp flutuante (componente em js/footer.js) ===== -->
  <div id="footer-mount"></div>

</body>
</html>
